---
- name: Ensure .agents directory exists
  ansible.builtin.file:
    path: "{{ agents_home }}"
    state: directory
    mode: "0755"

- name: Ensure .agents protocols directory exists
  ansible.builtin.file:
    path: "{{ agents_protocols_home }}"
    state: directory
    mode: "0755"

- name: Ensure .agents prompts directory exists
  ansible.builtin.file:
    path: "{{ agents_prompts_home }}"
    state: directory
    mode: "0755"

- name: Ensure .agents templates directory exists
  ansible.builtin.file:
    path: "{{ agents_protocol_templates_home }}"
    state: directory
    mode: "0755"

- name: Ensure templates directory exists
  ansible.builtin.file:
    path: "{{ agents_templates_home }}"
    state: directory
    mode: "0755"

- name: Copy safe baseline agent config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/base-config.toml"
    dest: "{{ agents_home }}/base-config.toml"
    mode: "0644"

- name: Copy global agent rules
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/AGENTS.md"
    dest: "{{ agents_global_md }}"
    mode: "0644"

- name: Copy managed protocols
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/protocols/{{ item }}"
    dest: "{{ agents_protocols_home }}/{{ item }}"
    mode: "0644"
  loop: "{{ agents_protocol_files }}"

- name: Copy managed prompts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/prompts/{{ item }}"
    dest: "{{ agents_prompts_home }}/{{ item }}"
    mode: "0644"
  loop: "{{ agents_prompt_files }}"

- name: Copy managed protocol templates
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/protocol-templates/{{ item }}"
    dest: "{{ agents_protocol_templates_home }}/{{ item }}"
    mode: "0644"
  loop: "{{ agents_protocol_template_files }}"

- name: Remove obsolete managed workflow files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ agents_home }}/workflows/plan-build.md"
    - "{{ agents_home }}/workflows/incremental-audit.md"
    - "{{ agents_prompts_home }}/project-derived-incremental-audit.md"

- name: Copy project AGENTS templates
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/agents/templates/{{ item }}"
    dest: "{{ agents_templates_home }}/{{ item }}"
    mode: "0644"
  loop: "{{ agents_project_template_files }}"

- name: Ensure tool config parent directories exist
  ansible.builtin.file:
    path: "{{ item.parent }}"
    state: directory
    mode: "0755"
  loop: "{{ agents_tool_links }}"

- name: Gather tool config target status
  ansible.builtin.stat:
    path: "{{ item.path }}"
    follow: false
  loop: "{{ agents_tool_links }}"
  register: agents_tool_link_stats

- name: Back up existing non-symlink tool config files
  ansible.builtin.command:
    argv:
      - mv
      - "{{ item.stat.path }}"
      - "{{ item.stat.path }}.bak.{{ ansible_date_time.iso8601_basic_short }}"
  loop: "{{ agents_tool_link_stats.results }}"
  when:
    - item.stat.exists
    - not item.stat.islnk | default(false)
  changed_when: true

- name: Symlink global AGENTS file into tool configs
  ansible.builtin.file:
    src: "{{ agents_global_md }}"
    dest: "{{ item.path }}"
    state: link
    force: true
  loop: "{{ agents_tool_links }}"
