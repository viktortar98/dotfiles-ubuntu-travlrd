---
- name: Ensure bashrc exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.bashrc"
    state: file
    mode: "0644"

- name: Manage shell block in bashrc
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_home }}/.bashrc"
    marker: "# {mark} DOTFILES MANAGED BLOCK"
    block: "{{ shell_managed_block }}"

- name: Ensure gh workspace exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/gh"
    state: directory
    mode: "0755"

- name: Copy utility scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../config/bin/clone-org-repos"
    dest: "{{ dotfiles_home }}/.local/bin/clone-org-repos"
    mode: "0755"
