---
- name: Ensure git config directory exists
  ansible.builtin.file:
    path: "{{ dotfiles_home }}/.config/git"
    state: directory
    mode: "0755"

- name: Set git credential helper to gh
  ansible.builtin.git_config:
    name: credential.helper
    value: "!/usr/bin/env gh auth git-credential"
    scope: global

- name: Set git user name when provided
  ansible.builtin.git_config:
    name: user.name
    value: "{{ git_user_name }}"
    scope: global
  when: git_user_name | length > 0

- name: Set git user email when provided
  ansible.builtin.git_config:
    name: user.email
    value: "{{ git_user_email }}"
    scope: global
  when: git_user_email | length > 0

- name: Set git core.autocrlf to input
  ansible.builtin.git_config:
    name: core.autocrlf
    value: input
    scope: global

- name: Add AGENTS.local.md to global gitignore
  ansible.builtin.blockinfile:
    path: "{{ dotfiles_home }}/.gitignore_global"
    create: true
    mode: "0644"
    marker: "# {mark} dotfiles AGENTS.local"
    block: |
      AGENTS.local.md

- name: Set git core.excludesfile
  ansible.builtin.git_config:
    name: core.excludesfile
    value: "{{ dotfiles_home }}/.gitignore_global"
    scope: global
